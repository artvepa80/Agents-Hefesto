name: Traffic Report

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      post_issue:
        description: "Create/update a GitHub Issue with the report?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  issues: write

jobs:
  traffic-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate traffic report
        env:
          # Falls back to github.token (has traffic read access for same-repo runs).
          # If that fails, set a TRAFFIC_TOKEN secret: Fine-Grained PAT with
          # "Administration: read", or a classic PAT with "repo" scope.
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN || github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          python scripts/traffic_report.py \
            --owner "$OWNER" \
            --repo "$REPO" \
            --token "$GH_TOKEN" \
            --output /tmp/traffic_report.md

      - name: Print report to summary
        run: cat /tmp/traffic_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update traffic-report issue
        if: ${{ github.event_name == 'schedule' || inputs.post_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          LABEL="traffic-report"

          # Ensure the label exists
          gh label create "$LABEL" \
            --description "Automated weekly traffic report" \
            --color "0075ca" \
            --repo "$OWNER/$REPO" \
            2>/dev/null || true

          # Close any existing open issue so history is preserved
          EXISTING=$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty' \
            --repo "$OWNER/$REPO")

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --comment "Superseded by a new weekly report." \
              --repo "$OWNER/$REPO"
          fi

          gh issue create \
            --title "📊 Weekly Traffic Report — $(date -u +'%Y-%m-%d')" \
            --body-file /tmp/traffic_report.md \
            --label "$LABEL" \
            --repo "$OWNER/$REPO"
