name: 'Hefesto Code Guardian'
description: 'AI-powered static analysis and security scanner for AI-generated code. Catches semantic drift, SQL injection, hardcoded secrets, and complexity issues across 21 formats in under 5 seconds. Pre-commit compatible.'
author: 'Narapa LLC'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  target:
    description: 'Path to analyze (file or directory)'
    required: false
    default: '.'
  fail_on:
    description: 'Exit with error if issues found at or above this severity (CRITICAL, HIGH, MEDIUM, LOW)'
    required: false
    default: 'CRITICAL'
  min_severity:
    description: 'Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW, INFO)'
    required: false
    default: 'LOW'
  format:
    description: 'Output format (text, json, html)'
    required: false
    default: 'text'
  telemetry:
    description: 'Opt-in to anonymous telemetry (1=enable, 0=disable)'
    required: false
    default: '0'

runs:
  using: 'docker'
  image: 'Dockerfile.action'
  # Inputs are automatically passed as INPUT_<NAME> environment variables
  # args: []  <-- We use env vars for structured input handling

